 if(mood==="any")return foods.filter(f=>!isMeal(f) && !isCoffee(f));
 return [];
}
function cheapestCoffee(){
 return (S.foods||[]).filter(f=>f && +f.cal>0 && isCoffee(f)).sort((a,b)=>(+a.cal||0)-(+b.cal||0))[0]||null;
}
function makeSuggestion(items,mood,rem){
 const total=items.reduce((s,f)=>s+(+f.cal||0),0);
 const over=total>rem;
 const counts={};
 items.forEach(f=>counts[f.id]=(counts[f.id]||0)+1);
 const parts=Object.keys(counts).map(fid=>{
   const f=items.find(x=>x.id===fid), q=counts[fid];
   return q>1?`${f.name} ├Ќ${q}`:f.name;
 });
 return {id:uid("snack"),items,total,over,name:parts.join(" + "),mood};
}
function comboKey(items){
 const counts={};
 items.forEach(f=>counts[f.id]=(counts[f.id]||0)+1);
 return Object.keys(counts).sort().map(k=>k+":"+counts[k]).join("|");
}
function snackType(f){
 if(isCoffee(f))return "coffee";
 if(isSweet(f))return "sweet";
 if(isSalty(f))return "salty";
 return "other";
}
function snackScore(s,rem){
 return Math.abs(rem-s.total)+(s.over?8:0)+(s.items.length===1?12:0);
}
function hasDuplicates(items){
 const ids=items.map(f=>f.id);
 return new Set(ids).size!==ids.length;
}
function uniqueCategoryPick(candidates,rem){
 const sorted=[...candidates].sort((a,b)=>snackScore(a,rem)-snackScore(b,rem));
 const picked=[], usedCats=new Set();
 for(const s of sorted){
   const cat=s.primaryCat||snackCat(s.items[0])||snackType(s.items[0]);
   if(!usedCats.has(cat)){
     picked.push(s);
     usedCats.add(cat);
   }
   if(picked.length===3)break;
 }
 for(const s of sorted){
   if(picked.length===3)break;
   if(!picked.find(x=>comboKey(x.items)===comboKey(s.items)))picked.push(s);
 }
 return picked.slice(0,3);
}
function snackIdeas(mood){
 const rem=dayGoal()-calc().cal, limit=rem+50;
 let candidates=[];
 if(mood==="coffee"){
   const coffee=cheapestCoffee();
   const sweets=snackBase("sweet").filter(f=>(+f.cal||0)<=120).sort((a,b)=>(+a.cal||0)-(+b.cal||0));
   if(coffee){
    for(let i=0;i<sweets.length;i++){
      candidates.push(makeSuggestion([coffee,sweets[i]],mood,rem));
    }
   }
 }else if(mood==="any"){
   const base=snackBase("any");
   base.forEach(f=>{
     const s=makeSuggestion([f],mood,rem);
     s.primaryCat=snackCat(f)||snackType(f);
     candidates.push(s);
   });
   const small=base.filter(f=>(+f.cal||0)<=120);
   for(let i=0;i<small.length;i++){
     for(let j=i+1;j<small.length;j++){
       const s=makeSuggestion([small[i],small[j]],mood,rem);
       s.primaryCat=snackCat(small[i])||snackType(small[i]);
       candidates.push(s);
       for(let k=j+1;k<small.length;k++){
         const s3=makeSuggestion([small[i],small[j],small[k]],mood,rem);
         s3.primaryCat=snackCat(small[i])||snackType(small[i]);
         candidates.push(s3);
       }
     }
   }
 }else{
   const base=snackBase(mood);
   base.forEach(f=>candidates.push(makeSuggestion([f],mood,rem)));
   const small=base.filter(f=>(+f.cal||0)<=120);
   for(let i=0;i<small.length;i++){
     for(let j=i+1;j<small.length;j++){
       candidates.push(makeSuggestion([small[i],small[j]],mood,rem));
       for(let k=j+1;k<small.length;k++){
         candidates.push(makeSuggestion([small[i],small[j],small[k]],mood,rem));
       }
     }
   }
 }
 const seen=new Set();
 candidates=candidates.filter(s=>{
   if(s.total>limit)return false;
   if(s.total<=0)return false;
   if(hasDuplicates(s.items))return false;
   const key=comboKey(s.items);
   if(seen.has(key))return false;
   seen.add(key);
   return true;
 });
 if(mood==="any")return uniqueCategoryPick(candidates,rem);
 candidates.sort((a,b)=>snackScore(a,rem)-snackScore(b,rem));
 return candidates.slice(0,3);
}

}

 if(!S.openaiKey){openAiMissing();return}
 const btn=document.getElementById("checkAiBtn");
 btn.textContent="ОЉОЋОЊОДОфРђд";btn.classList.add("aiLoading");
 try{
   const prompt=`ОљОф ОъОбОеОЎОЏОћ ОљОЋОЏОю ОюОЎОЋОъОЪ ОљОЎОЕОЎ ОЉОбОЉОеОЎОф. ОћОЌОќОЎОеОЎ JSON ОЉОюОЉОЊ. ОћОбОеОЎОЏОЎ ОДОюОЋОеОЎОЋОф ОЋОЌОюОЉОЋОЪ ОюОъОаОћ ОљОЌОф ОюОцОЎ ОћОўОДОАОў. ОЌОЕОЋОЉ ОъОљОЋОЊ: ОљОю ОфОбОаОЎ ОЉОњОеОъОЎОЮ ОЏОЉОеОЎОеОф ОъОЌОЊОю. ОћОЕОфОъОЕОЎ ОЉОъОЎОЊОЋОф ОЉОЎОфОЎОЋОф ОўОЉОбОЎОЋОф ОЏОъОЋ ОЏОцОЎОф, ОЏОБ, ОЌОдОЎ ОЏОБ, ОцОеОЋОАОћ, ОЏОЋОА, ОДОбОеОћ ОДОўОаОћ, ОЌОЋОцОЪ, ОЎОЌОЎОЊОћ, 5 ОЏОцОЋОф ОљОЋОеОќ, ОЌОдОЎ ОцОЎОфОћ ОЋОЏОЋ'. ОћОЌОќОЎОеОЎ householdQuantity ОЉОъОЎОюОЎОЮ ОДОдОеОЋОф ОЋОаОЋОЌОЋОф. ОњОеОъОЎОЮ ОеОД ОљОЮ ОљОЎОЪ ОЊОеОџ ОЉОЎОфОЎОф ОАОЉОЎОеОћ. ОљОЮ ОЌОАОе ОњОЋОЊОю ОъОаОћ/ОЏОъОЋОф, ОАОъОаОЎ confidence ОЏ"ОдОеОЎОЏОћ ОбОЋОЊ ОеОњОб" ОЋОфОаОЎ ОЕОюОЋОЕ ОљОцОЕОеОЋОЎОЋОф ОњОЋОЊОю ОбОЮ ОъОАОцОеОЎОЮ ОЋОњОЮ householdQuantity ОюОЏОю ОљОцОЕОеОЋОф. ОљОю ОфОфОаОЎ ОўОЋОЋОЌОЎОЮ ОЉОфОЋОдОљОћ ОћОеОљОЕОЎОф Рђћ ОеОД ОъОАОцОе ОљОЌОЊ ОЉОљОъОдОб ОўОЋОЋОЌ ОАОЉОЎОе. ОўОДОАОў ОћОъОЕОфОъОЕ: ${txt}`;
   const schema={
    type:"object",
    additionalProperties:false,
    required:["name","calories","protein","householdQuantity","confidence","note","needsQuestion","question","options"],
    properties:{
      name:{type:"string"},
      calories:{type:"number"},
      protein:{type:"number"},
      householdQuantity:{type:"string"},
      confidence:{type:"string",enum:["ОЉОўОЋОЌОћ ОЉОќОћ","ОаОеОљОћ ОАОЉОЎОе","ОдОеОЎОЏОћ ОбОЋОЊ ОеОњОб"]},
      note:{type:"string"},
      needsQuestion:{type:"boolean"},
      question:{type:"string"},
      options:{type:"array",items:{type:"object",additionalProperties:false,required:["label","calories","protein","householdQuantity"],properties:{label:{type:"string"},calories:{type:"number"},protein:{type:"number"},householdQuantity:{type:"string"}}}}
    }
   };
   const res=await fetch("https://api.openai.com/v1/responses",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+S.openaiKey},
    body:JSON.stringify({
      model:"gpt-4.1-mini",
      input:[{role:"system",content:"You are a careful nutrition estimator. Return only valid JSON matching the schema. Keep Hebrew food names natural. Prefer household measures over grams. Never give diet advice."},{role:"user",content:prompt}],
      text:{format:{type:"json_schema",name:"food_estimate",strict:true,schema}}
    })
   });
   if(!res.ok){
    const err=await res.text();
    throw new Error(err||"OpenAI error");
   }
   const data=await res.json();
   const out=data.output_text || data.output?.flatMap(o=>o.content||[]).map(c=>c.text||"").join("") || "";
   pendingAI=JSON.parse(out);
   pendingAI.originalText=txt;
   pendingAI.edited=false;
   showAiResult();
 }catch(e){
   console.error(e);
   sheet(`<div class=shtitle>ОъОЕОћОЋ ОаОфОДОб ОЉОЉОЊОЎОДОћ</div><div class=shsub>ОЎОЏОЋОю ОюОћОЎОЋОф ОЕОћОъОцОфОЌ ОюОљ ОфОДОЎОЪ, ОЕОљОЎОЪ ОћОеОЕОљОћ ОюОъОЋОЊОю, ОљОЋ ОЕОЌОЎОЉОЋОе ОћОЊОцОЊОцОЪ ОаОЌОАОЮ.</div><button class=primary style="width:100%" onclick=hideSheet()>ОАОњОЋОе</button>`);
 }finally{
   btn.textContent="ОЉОЊОДОЎ ОюОЎ";btn.classList.remove("aiLoading");
 }
}

function showAiResult(){
 if(!pendingAI)return;
 const low=pendingAI.confidence==="ОдОеОЎОЏОћ ОбОЋОЊ ОеОњОб"||pendingAI.needsQuestion;
 const opts=(pendingAI.options||[]).slice(0,3);
 sheet(`<div class=shtitle>ОЉОЊОДОфОЎ ОюОџ</div>${pendingAI.imageDataUrl?`<img class=previewTiny src="${pendingAI.imageDataUrl}">`:""}<div class=shsub>${esc(pendingAI.originalText||"")}</div><div class="tag ${confClass(pendingAI.confidence)}">${pendingAI.confidence}</div><div class=aiResultName>${esc(pendingAI.name)}</div><div class=aiResultNum>${n(pendingAI.calories)}</div>${pendingAI.householdQuantity?`<div class=qtyLine>ОЏОъОЋОф: ${esc(pendingAI.householdQuantity)}</div>`:""}<div class=metric>ОЌОюОЉОЋОЪ: ${n(pendingAI.protein)} ОњОеОЮ</div>${pendingAI.note?`<div class=smallnote>${esc(pendingAI.note)}</div>`:""}${low?`<div class=note>${esc(pendingAI.question||"ОъОћ ОњОЋОЊОю ОћОъОаОћ?")}</div><div class=sizeOptions>${opts.map((o,i)=>`<button class=sizeBtn onclick="chooseAiOption(${i})">${esc(o.label)}<small>${n(o.calories)} ОДОюО│</small>${o.householdQuantity?`<small>${esc(o.householdQuantity)}</small>`:""}</button>`).join("")}</div>`:""}<div class=aiActions><button class="primary wide" onclick=addAiToLog()>ОћОЋОАОЎОцОЎ ОюОЎОЋОъОЪ</button><button class=secondary onclick=editAiBeforeAdd()>ОбОеОЏОЎ ОюОцОаОЎ ОћОЋОАОцОћ</button><button class=secondary onclick=saveAiFavorite()>ОЕОъОеОЎ ОюОДОЉОЋОбОЎОЮ</button></div>`);
}
function chooseAiOption(i){
 const o=(pendingAI.options||[])[i]; if(!o)return;
 pendingAI.calories=+o.calories||pendingAI.calories;
 pendingAI.protein=+o.protein||pendingAI.protein;
 pendingAI.householdQuantity=o.householdQuantity||o.label||pendingAI.householdQuantity;
 pendingAI.confidence="ОаОеОљОћ ОАОЉОЎОе";
 pendingAI.needsQuestion=false;
 pendingAI.note=`ОаОЉОЌОеОћ ОъОаОћ: ${o.label}`;
 showAiResult();
}

function chooseAiFavoriteCategory(){
 pendingCategorySave="ai";
 const opts=S.cats.sort((a,b)=>a.order-b.order).map(c=>`<button class=secondary style="width:100%;margin-bottom:8px;text-align:right" onclick="saveAiToCat('${c.id}')">${esc(c.name)}</button>`).join("");
 sheet(`<div class=shtitle>ОюОљОЎОќОЋ ОДОўОњОЋОеОЎОћ ОюОЕОъОЋОе?</div><div class=shsub>${esc(pendingAI.name)} ┬и ${pendingAI.householdQuantity?esc(pendingAI.householdQuantity)+" ┬и ":""}${n(pendingAI.calories)} ОДОюО│ ┬и ${n(pendingAI.protein)} ОЌОюОЉОЋОЪ</div>${opts}<button class=primary style="width:100%;margin-top:6px" onclick="newCategoryForSave('ai')">+ ОДОўОњОЋОеОЎОћ ОЌОЊОЕОћ</button>`);
}
function saveAiToCat(catId){
 const cat=S.cats.find(c=>c.id===catId);
 if(!pendingAI||!cat)return;
 if(!S.foods.some(f=>f.name===pendingAI.name)){
  S.foods.unshift({id:uid("food"),name:pendingAI.name,cal:+pendingAI.calories||0,prot:+pendingAI.protein||0,householdQuantity:pendingAI.householdQuantity||"",emoji:emojiFor(pendingAI.name),category:cat.name,order:-Date.now(),verified:true});
  save();
 }
 hideSheet();render();toast(`${pendingAI.name} ОаОЕОъОе ОюОДОЉОЋОбОЎОЮ`);
}


function newCategoryForSave(mode){
 pendingCategorySave=mode||pendingCategorySave;
 sheet(`<div class=shtitle>ОДОўОњОЋОеОЎОћ ОЌОЊОЕОћ</div><div class=shsub>ОфОаОЎ ОюОћ ОЕОЮ, ОЋОљОќ ОћОъОљОЏОю ОЎОЎОЕОъОе ОЎОЕОе ОюОЕОЮ.</div><div class=form style="margin-top:10px"><input id=newCatName class=input placeholder="ОюОъОЕОю: ОАОюОўОЎОЮ / ОљОеОЋОЌОЋОф ОбОеОЉ / ОъОфОЋОДОЎОЮ"><button class=primary onclick=saveNewCategoryForPending()>ОдОеОЎ ОЋОЕОъОеОЎ ОюОЏОљОЪ</button><button class=secondary onclick="${pendingCategorySave==='ai'?'chooseAiFavoriteCategory()':'saveManualFavorite()'}">ОЌОќОеОћ</button></div>`);
 setTimeout(()=>document.getElementById("newCatName")?.focus(),80);
}
function saveNewCategoryForPending(){
 const name=(document.getElementById("newCatName")?.value||"").trim();
 if(!name){toast("ОдОеОЎОџ ОЕОЮ ОДОўОњОЋОеОЎОћ");return}
 let cat=S.cats.find(c=>c.name===name);
 if(!cat){
  cat={id:uid("cat"),name,order:S.cats.length};
  S.cats.push(cat);
  save();
 }
 if(pendingCategorySave==="ai") saveAiToCat(cat.id);
 else saveManualToCat(cat.id);
}

function saveManualFavorite(){
 const name=(document.getElementById("mName")?.value||"").trim();
 const cal=+document.getElementById("mCal")?.value;
 const prot=+document.getElementById("mProt")?.value||0;
 if(!name||!cal){toast("ОдОеОЎОџ ОЕОЮ ОЋОДОюОЋОеОЎОЋОф ОЏОЊОЎ ОюОЕОъОЋОе");return}
 pendingCategorySave="manual";
 const opts=S.cats.sort((a,b)=>a.order-b.order).map(c=>`<button class=secondary style="width:100%;margin-bottom:8px;text-align:right" onclick="saveManualToCat('${c.id}')">${esc(c.name)}</button>`).join("");
 sheet(`<div class=shtitle>ОюОљОЎОќОЋ ОДОўОњОЋОеОЎОћ ОюОЕОъОЋОе?</div><div class=shsub>${esc(name)} ┬и ${n(cal)} ОДОюО│ ┬и ${n(prot)} ОЌОюОЉОЋОЪ</div>${opts}<button class=primary style="width:100%;margin-top:6px" onclick="newCategoryForSave('manual')">+ ОДОўОњОЋОеОЎОћ ОЌОЊОЕОћ</button>`);
}
function saveManualToCat(catId){
 const name=(document.getElementById("mName")?.value||"").trim();
 const cal=+document.getElementById("mCal")?.value;
 const prot=+document.getElementById("mProt")?.value||0;
 const cat=S.cats.find(c=>c.id===catId);
 if(!name||!cal||!cat){toast("ОЌОАОе ОъОЎОЊОб ОюОЕОъОЎОеОћ");return}
 if(S.foods.some(f=>f.name===name)){hideSheet();toast("ОЏОЉОе ОДОЎОЎОЮ ОЉОДОЉОЋОбОЎОЮ");return}
 S.foods.unshift({id:uid("food"),name,cal,prot,emoji:emojiFor(name),category:cat.name,order:-Date.now(),verified:true});
 save();
 hideSheet();
 render();
 toast(`${name} ОаОЕОъОе ОюОДОЉОЋОбОЎОЮ`);
}

function addEntry(e,fixed){const d=today();if(!S.logs[d])S.logs[d]=[];S.logs[d].push({id:uid("e"),time:tnow(),...e});if(e.foodId)S.usage[e.foodId]=(S.usage[e.foodId]||0)+1;save();render();if(fixed){const c=calc(),rem=Math.max(0,dayGoal()-c.cal);let msg=`${e.name} ОаОЋОАОБ ┬и ${n(e.cal)} ОДОюО│ ┬и ОаОЕОљОе ${n(rem)}`;if(e.prot>=5)msg+=` ┬и ОЌОюОЉОЋОЪ ${n(c.prot)}/${S.proteinGoal}`;toast(msg)}}

function cleanEntryName(name){
 return String(name||"").replace(/\s*┬и\s*ОъОаОЕОаОЋОЕОЎОъОЎ\s*$/,"").replace(/\s├Ќ\d+(\.\d+)?$/,"").trim();
}
function saveEntryFavoriteSheet(eid){
 const e=dayLog().find(x=>x.id===eid);
 if(!e){toast("ОюОљ ОъОдОљОфОЎ ОљОф ОћОцОеОЎОў");return}
 const name=cleanEntryName(e.name);
 const exists=S.foods.find(f=>f.name===name && Math.round(+f.cal||0)===Math.round(+e.cal||0));
 if(exists){toast("ОќОћ ОЏОЉОе ОЉОъОЋОбОЊОцОЎОЮ");return}
 const opts=S.cats.map(c=>`<option value="${esc(c.name)}">${esc(c.name)}</option>`).join("");
 sheet(`<div class=shtitle>ОюОЕОъОЋОе ОюОъОЋОбОЊОцОЎОЮ?</div><div class=shsub>${esc(name)} ┬и ${n(e.cal)} ОДОюО│ ┬и ${n(e.prot)} ОЌОюОЉОЋОЪ</div><div class=form style="margin-top:10px"><input id=favName class=input value="${esc(name)}"><div class=tw><input id=favCal class=input type=number value="${Math.round(+e.cal||0)}" placeholder="ОДОюОЋОеОЎОЋОф"><input id=favProt class=input type=number value="${Math.round(+e.prot||0)}" placeholder="ОЌОюОЉОЋОЪ"></div><select id=favCat class=select>${opts}</select><button class=primary onclick="saveEntryFavorite('${eid}')">ОЕОъОеОЎ ОюОъОЋОбОЊОцОЎОЮ</button><button class=secondary onclick=fullLog()>ОЌОќОеОћ ОюОЎОЋОъОЪ</button></div>`);
}
function saveEntryFavorite(eid){
 const e=dayLog().find(x=>x.id===eid);
 if(!e){toast("ОюОљ ОъОдОљОфОЎ ОљОф ОћОцОеОЎОў");return}
 const vals={name:(favName.value||"").trim(),cal:+favCal.value||0,prot:+favProt.value||0,emoji:e.emoji||emojiFor(favName.value||e.name),category:favCat.value};
 if(!vals.name||!vals.cal){toast("ОдОеОЎОџ ОЕОЮ ОЋОДОюОЋОеОЎОЋОф");return}
 const exists=S.foods.find(f=>f.name===vals.name && Math.round(+f.cal||0)===Math.round(vals.cal));
 if(exists){toast("ОќОћ ОЏОЉОе ОЉОъОЋОбОЊОцОЎОЮ");return}
 S.foods.unshift({id:uid("food"),...vals,order:-Date.now(),verified:true});
 save();
 toast("ОаОЕОъОе ОюОъОЋОбОЊОцОЎОЮ РюЊ");
 fullLog();
}

function fullLog(){const arr=[...dayLog()].reverse();sheet(`<div class=shtitle>ОћОЎОЋОЮ ОЕОюОЎ</div><div class=shsub>ОћОЌОЊОЕ ОЉОЎОЋОфОе ОюОъОбОюОћ</div>${arr.length?arr.map(e=>row(e,true)).join(""):'<div class=empty>ОљОЎОЪ ОцОеОЎОўОЎОЮ</div>'}`)}
function deleteEntry(id){S.logs[today()]=(S.logs[today()]||[]).filter(e=>e.id!==id);save();hideSheet();render();fullLog()}
function goalSheet(){sheet(`<div class=shtitle>ОЎОбОЊ ОћОЎОЋОЮ</div><div class=shsub>ОъОЕОцОЎОб ОеОД ОбОю ОћОЎОЋОЮ ОћОцОфОЋОЌ</div><button class=secondary style="width:100%;margin-bottom:8px" onclick="setGoal(1100)">1100</button><button class=secondary style="width:100%;margin-bottom:8px" onclick="setGoal(1400)">ОЎОЋОЮ ОњОъОЎОЕ Рђћ 1400</button><button class=secondary style="width:100%" onclick="customGoal()">ОъОЋОфОљОЮ</button><input id=goalCustom class=input type=number placeholder="ОЎОбОЊ ОъОЋОфОљОЮ" style="display:none;margin-top:10px"><button id=goalSave class=primary style="display:none;width:100%;margin-top:10px" onclick="setGoal(+goalCustom.value)">ОЕОъОеОЎ ОЎОбОЊ</button>`)}
function customGoal(){goalCustom.style.display="block";goalSave.style.display="block";goalCustom.focus()}
function setGoal(g){if(!g)return;S.dailyGoals[today()]=g;save();hideSheet();render()}
function closeDay(){if(!S.closed.includes(today()))S.closed.push(today());save();render()}
function reopen(){S.closed=S.closed.filter(x=>x!==today());save();render()}
function restConfirm(){sheet(`<div class=shtitle>ОюОћОцОЋОџ ОљОф ОћОЎОЋОЮ ОюОЎОЋОЮ ОъОаОЋОЌОћ?</div><div class=shsub>ОћОљОЋОЏОю ОЕОЏОЉОе ОћОЋОАОцОф ОЎОЎОЕОъОе, ОљОЉОю ОћОЎОЋОЮ ОюОљ ОЎОЎОЏОаОА ОюОАОўОўОЎОАОўОЎОДОћ.</div><div class=tw><button class=primary onclick=makeRest()>ОЏОЪ, ОбОќОЉОЎ ОћОЎОЋОЮ ОюОљ</button><button class=secondary onclick=hideSheet()>ОЌОќОеОћ ОюОАОцОЎОеОћ</button></div>`)}
function makeRest(){if(!S.rest.includes(today()))S.rest.push(today());S.closed=S.closed.filter(x=>x!==today());save();hideSheet();render()}
function unrest(){S.rest=S.rest.filter(x=>x!==today());save();render()}
function saveWeight(){const v=+wInp.value;if(!v||v<30||v>250){toast("ОъОЕОДОю ОюОљ ОфОДОЎОЪ");return}const e=S.weights.find(x=>x.date===today());if(e)e.weight=v;else S.weights.push({date:today(),weight:v});S.weights.sort((a,b)=>a.date.localeCompare(b.date));save();render()}
function renderTrend(){const ws=[...S.weights].filter(w=>fri(w.date)).sort((a,b)=>a.date.localeCompare(b.date)),last=ws.at(-1),prev=ws.at(-2);let diff="ОбОЋОЊ ОљОЎОЪ ОъОАОцОЎОД ОЕОДОЎОюОЋОф";if(last&&prev){const d=last.weight-prev.weight,g=Math.abs(Math.round(d*1000));diff=d<-0.1?`ОЎОеОЊОф ${g} ОњОеОЮ`:d>0.1?`ОбОюОЎОф ${g} ОњОеОЮ`:"ОЎОдОЎОЉ ОћОЕОЉОЋОб"}const wk=weekStats();document.getElementById("s-trend").innerHTML=`${header()}<div class=card><div class=title>ОъОњОъОћ</div><div class=big>${diff}</div><div class=metric>ОъОЕОДОю ОљОЌОеОЋОЪ: ${last?last.weight+" ОДО┤Оњ":"Рђћ"}</div><div class=metric>ОаОЋОфОе ОюОЎОбОЊ: ${last?Math.max(0,last.weight-S.weightGoal).toFixed(1):"Рђћ"} ОДО┤Оњ</div><div class=metric>ОдОцОЎ: ${forecast(ws)}</div></div><div class=card><div class=title>ОњОеОБ ОЕОДОЎОюОЋОф ОЕОЎОЕОЎ</div><div class="chartbox"><canvas id=canvasTrend></canvas></div></div><div class=card><div class=title>ОћОЕОЉОЋОб ОћОаОЋОЏОЌОЎ</div><div class=metric>ОЎОъОЎ ОАОцОЎОеОћ ОАОњОЋОеОЎОЮ: ${wk.closed}</div><div class=metric>ОЎОъОЎ ОъОаОЋОЌОћ: ${wk.rest}</div><div class=metric>ОЎОъОЎОЮ ОюОљ ОАОњОЋОеОЎОЮ: ${wk.open}</div><div class=metric>ОъОъОЋОдОб ОДОюОЋОеОЎОЋОф: ${wk.avgCal}</div><div class=metric>ОъОъОЋОдОб ОЌОюОЉОЋОЪ: ${wk.avgProt}</div></div>`;setTimeout(()=>drawCanvas("canvasTrend",ws.slice(-12)),60)}
function forecast(ws){if(ws.length<2)return"ОбОЋОЊ ОъОЋОДОЊОЮ ОюОдОцОЎ. ОаОдОўОеОџ ОбОЋОЊ ОЕОДОЎОюОћоЙОЕОфОЎОЎОЮ.";const a=ws[0],b=ws.at(-1),weeks=Math.max(1,(new Date(b.date)-new Date(a.date))/(7*864e5)),rate=(a.weight-b.weight)/weeks;if(rate<=0)return"ОбОЋОЊ ОъОЋОДОЊОЮ ОюОдОцОЎ. ОаОдОўОеОџ ОбОЋОЊ ОЕОДОЎОюОћоЙОЕОфОЎОЎОЮ.";const left=Math.ceil((b.weight-S.weightGoal)/rate),dt=new Date();dt.setDate(dt.getDate()+left*7);return`ОбОЋОЊ ${left} ОЕОЉОЋОбОЋОф ┬и ОЉОбОеОџ ${dt.toLocaleDateString("he-IL")}`}
function weekStats(){let closed=0,restc=0,open=0,cs=0,ps=0;const now=new Date(),start=new Date(now);start.setDate(now.getDate()-now.getDay());for(let i=0;i<7;i++){const d=new Date(start);d.setDate(start.getDate()+i);const k=d.toISOString().slice(0,10);if(fri(k))continue;if(S.rest.includes(k)){restc++;continue}if(S.closed.includes(k)){closed++;const c=calc(k);cs+=c.cal;ps+=c.prot}else if((S.logs[k]||[]).length)open++}return{closed,rest:restc,open,avgCal:closed?n(cs/closed):"Рђћ",avgProt:closed?n(ps/closed):"Рђћ"}}
function drawChart(){drawCanvas("canvas",[...S.weights].filter(w=>fri(w.date)).sort((a,b)=>a.date.localeCompare(b.date)).slice(-8))}
function drawCanvas(id,ws){
 const c=document.getElementById(id);
 if(!c||!window.Chart)return;
 if(CHARTS[id]){CHARTS[id].destroy();CHARTS[id]=null;}
 const wrap=c.parentElement;
 if(wrap){wrap.style.height="170px";wrap.style.maxHeight="170px";wrap.style.overflow="hidden";}
 c.style.height="170px";
 c.style.maxHeight="170px";
 c.height=170;
 CHARTS[id]=new Chart(c,{type:"line",data:{labels:ws.map(w=>new Date(w.date).toLocaleDateString("he-IL",{day:"numeric",month:"numeric"})),datasets:[{data:ws.map(w=>w.weight),borderColor:"#b85f3a",backgroundColor:"rgba(184,95,58,.12)",tension:.35,pointRadius:4,pointBackgroundColor:"#b85f3a"},{data:ws.map(()=>S.weightGoal),borderColor:"#637447",borderDash:[5,5],pointRadius:0}]},options:{responsive:true,maintainAspectRatio:false,animation:false,resizeDelay:180,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{grid:{color:"rgba(58,37,31,.08)"}}}}});
}
function renderMe(){
 document.getElementById("s-me").innerHTML=`${header()}<div class="card meCard"><div><div class=title>ОћОДОЉОЋОбОЎОЮ ОЕОюОЎ</div><div class=smallnote>ОаОЎОћОЋОю ОћОъОљОЏОюОЎОЮ ОЕОљОаОЎ ОАОЋОъОЏОф ОбОюОЎОћОЮ</div></div><button class=small onclick=manageFoods()>ОаОЎОћОЋОю</button></div><div class=card><div class=title>ОЎОбОЊОЎОЮ</div><div class=form style="margin-top:10px"><div class="smallnote">ОЎОбОЊ ОДОюОЋОеОЎОЋОф ОЉОАОЎОА</div><input id=base class=input type=number value="${S.baseGoal}"><div class="smallnote">ОЎОбОЊ ОъОЕОДОю</div><input id=wgoal class=input type=number step=.1 value="${S.weightGoal}"><button class=primary onclick=saveGoals()>ОЕОъОеОЎ ОЎОбОЊОЎОЮ</button></div></div><div class=card><div class=title>ОЌОЎОЉОЋОе OpenAI</div><div class=smallnote>ОаОЊОеОЕ ОюОћОбОеОЏОЋОф ОўОДОАОў ОЋОфОъОЋОаОћ.</div><input id=openaiKey class=input type=password placeholder="API key" value="${esc(S.openaiKey||"")}" style="margin-top:10px"><div class=tw><button class=primary onclick=saveOpenAIKey()>ОЕОъОЎОеОћ</button><button class=secondary onclick=testOpenAI()>ОЉОЊОЎОДОф ОЌОЎОЉОЋОе</button></div></div>`;
}

function saveGoals(){S.baseGoal=+base.value||1100;S.weightGoal=+wgoal.value||55;save();toast("ОћОЎОбОЊОЎОЮ ОаОЕОъОеОЋ");render()}
function saveOpenAIKey(){S.openaiKey=(document.getElementById("openaiKey")?.value||"").trim();save();toast("ОћОЌОЎОЉОЋОе ОаОЕОъОе")}
async function testOpenAI(){
 saveOpenAIKey();
 if(!S.openaiKey){toast("ОдОеОЎОџ API key");return}
 try{
  const res=await fetch("https://api.openai.com/v1/responses",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+S.openaiKey},body:JSON.stringify({model:"gpt-4.1-mini",input:"Return only the word ok."})});
  if(!res.ok)throw new Error(await res.text());
  toast("ОћОЌОЎОЉОЋОе ОбОЋОЉОЊ");
 }catch(e){console.error(e);toast("ОћОЌОЎОЉОЋОе ОюОљ ОбОЉОЊ")}
}
function manageFoods(){const cats=[...S.cats].sort((a,b)=>a.order-b.order);sheet(`<div class=shtitle>ОаОЎОћОЋОю ОћОДОЉОЋОбОЎОЮ</div><div class=shsub>ОЌОЎОдОЎОЮ ОюОАОЎОЊОЋОе, ОбОеОЎОЏОћ ОЋОъОЌОЎОДОћ</div><button class=primary style="width:100%;margin-bottom:9px" onclick=editFood()>+ ОъОљОЏОю ОДОЉОЋОб ОЌОЊОЕ</button><button class=secondary style="width:100%;margin-bottom:9px" onclick=catEditor()>ОаОЎОћОЋОю ОДОўОњОЋОеОЎОЋОф</button>${cats.map(c=>`<div class="cat open"><div class=cathead>${esc(c.name)}</div><div class=catbody>${S.foods.filter(f=>f.category===c.name).sort((a,b)=>(a.order||0)-(b.order||0)).map(mFood).join("")||'<div class=empty>ОљОЎОЪ ОцОеОЎОўОЎОЮ</div>'}</div></div>`).join("")}`)}
function mFood(f){return`<div class=row><div class=emoji>${f.emoji}</div><div class=main><div class=name>${esc(f.name)}</div><div class=meta>${n(f.cal)} ОДОюО│ ┬и ${n(f.prot)} ОЌОюОЉОЋОЪ</div></div><button class=mini onclick="moveFood('${f.id}',-1)">РєЉ</button><button class=mini onclick="moveFood('${f.id}',1)">РєЊ</button><button class=mini onclick="editFood('${f.id}')">Рюј</button><button class=mini onclick="delFood('${f.id}')">├Ќ</button></div>`}
function moveFood(id,dir){const f=S.foods.find(x=>x.id===id),same=S.foods.filter(x=>x.category===f.category).sort((a,b)=>(a.order||0)-(b.order||0)),i=same.findIndex(x=>x.id===id),sw=same[i+dir];if(sw){[f.order,sw.order]=[sw.order,f.order];save();manageFoods()}}
function delFood(id){S.foods=S.foods.filter(f=>f.id!==id);save();manageFoods()}
function editFood(id){const f=id?S.foods.find(x=>x.id===id):{name:"",cal:"",prot:"",emoji:"­ЪЦў",category:S.cats[0]?.name||"ОЕОъОЋОеОЎОЮ ОЕОюОЎ"};sheet(`<div class=shtitle>${id?'ОбОеОЎОЏОф ОъОљОЏОю':'ОъОљОЏОю ОДОЉОЋОб ОЌОЊОЕ'}</div><div class=form style="margin-top:10px"><input id=efn class=input placeholder=ОЕОЮ value="${esc(f.name)}"><input id=efc class=input type=number placeholder=ОДОюОЋОеОЎОЋОф value="${f.cal}"><input id=efp class=input type=number placeholder=ОЌОюОЉОЋОЪ value="${f.prot}"><input id=efe class=input placeholder=ОљОЎОъОЋОњО│ОЎ value="${f.emoji||'­ЪЦў'}"><select id=efcat class=select>${S.cats.map(c=>`<option ${c.name===f.category?'selected':''}>${esc(c.name)}</option>`).join("")}</select><button class=primary onclick="saveFood('${id||""}')">ОЕОъОеОЎ</button></div>`)}
function saveFood(id){const vals={name:efn.value.trim(),cal:+efc.value||0,prot:+efp.value||0,emoji:efe.value.trim()||"­ЪЦў",category:efcat.value};if(!vals.name||!vals.cal){toast("ОдОеОЎОџ ОЕОЮ ОЋОДОюОЋОеОЎОЋОф");return}if(id)Object.assign(S.foods.find(f=>f.id===id),vals);else S.foods.unshift({id:uid("food"),...vals,order:-Date.now(),verified:true});save();manageFoods()}
function catEditor(){sheet(`<div class=shtitle>ОаОЎОћОЋОю ОДОўОњОЋОеОЎОЋОф</div><div class=form>${S.cats.sort((a,b)=>a.order-b.order).map(c=>`<div class=row><input class=input value="${esc(c.name)}" onchange="renameCat('${c.id}',this.value)"><button class=mini onclick="delCat('${c.id}')">ОъОЌОДОЎ</button></div>`).join("")}<button class=primary onclick=addCat()>+ ОДОўОњОЋОеОЎОћ ОЌОЊОЕОћ</button><button class=secondary onclick=manageFoods()>ОЌОќОеОћ</button></div>`)}
function renameCat(id,name){const c=S.cats.find(x=>x.id===id);if(!c||!name.trim())return;const old=c.name;c.name=name.trim();S.foods.forEach(f=>{if(f.category===old)f.category=c.name});save()}
function addCat(){const name=prompt("ОЕОЮ ОДОўОњОЋОеОЎОћ ОЌОЊОЕОћ");if(!name)return;S.cats.push({id:uid("cat"),name,order:S.cats.length});save();catEditor()}
function delCat(id){const c=S.cats.find(x=>x.id===id),others=S.cats.filter(x=>x.id!==id);if(!others.length){toast("ОљОЎ ОљОцОЕОе ОюОъОЌОЋОД ОљОф ОћОДОўОњОЋОеОЎОћ ОћОљОЌОеОЋОаОћ");return}const target=prompt("ОюОљОЪ ОюОћОбОЉОЎОе ОљОф ОћОъОљОЏОюОЎОЮ?",others[0].name)||others[0].name;S.foods.forEach(f=>{if(f.category===c.name)f.category=target});S.cats=S.cats.filter(x=>x.id!==id);save();catEditor()}
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(window.tt);window.tt=setTimeout(()=>t.classList.remove("show"),1700)}
function sheet(html){document.getElementById("sheetbody").innerHTML=html;document.getElementById("sheet").classList.add("show")}
function hideSheet(){document.getElementById("sheet").classList.remove("show")}
render(); if("serviceWorker" in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
</script></body></html>
