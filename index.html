.row{display:flex;align-items:center;gap:10px;border:1px solid var(--line);background:rgba(255,255,255,.55);border-radius:17px;padding:10px;margin-bottom:8px}.time{direction:ltr;font-size:11px;font-weight:900;color:var(--muted);min-width:38px;text-align:left}.emoji{width:34px;height:34px;border-radius:50%;background:var(--paper2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}.main{flex:1;min-width:0}.name{font-size:14px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meta{font-size:12px;color:var(--muted);font-weight:800}.badge{font-size:12px;font-weight:900;color:var(--rust);background:#f8e3d7;border-radius:99px;padding:4px 9px;white-space:nowrap}.del{border:none;background:none;color:var(--muted);font-size:19px}
.actions{display:grid;grid-template-columns:1.35fr .95fr;gap:9px}.primary,.secondary,.quiet{border:none;border-radius:18px;padding:14px;font-family:inherit;font-weight:900;font-size:15px}.primary{background:var(--rust);color:white;box-shadow:0 9px 22px rgba(184,95,58,.25)}.secondary{background:var(--paper);color:#4a3028;border:1px solid var(--line)}.quiet{background:transparent;color:var(--muted);border:1px solid var(--line)}
.fab{position:fixed;bottom:calc(75px + var(--safe));left:50%;transform:translateX(-50%);width:66px;height:66px;border-radius:50%;border:5px solid rgba(248,239,232,.95);background:var(--rust);color:#fff;font-size:38px;display:flex;align-items:center;justify-content:center;z-index:90;box-shadow:0 16px 32px rgba(58,37,31,.25)}.fab.hide{display:none}
nav{position:fixed;bottom:0;left:0;right:0;max-width:430px;margin:0 auto;background:rgba(255,250,245,.94);backdrop-filter:blur(16px);border-top:1px solid var(--line);padding:9px 14px calc(13px + var(--safe));display:grid;grid-template-columns:repeat(4,1fr);gap:4px;z-index:80}.nav{border:none;background:transparent;border-radius:16px;padding:8px 4px;font-family:inherit;font-weight:900;color:var(--muted);font-size:11px}.nav .ico{display:block;font-size:21px;line-height:1.1}.nav.active{background:#f4dfd2;color:var(--rust)}
.input,.select{width:100%;border:1px solid var(--line);background:rgba(255,255,255,.7);border-radius:17px;padding:13px 14px;font-family:inherit;font-weight:800;font-size:15px;color:var(--ink);outline:none}.input:focus,.select:focus{border-color:var(--rust)}

.big{font-size:42px;font-weight:900;color:var(--rust);line-height:1;margin:8px 0}.metric{font-weight:900;color:var(--muted);font-size:14px;margin:5px 0}canvas{width:100%;height:170px;display:block}.blocked{opacity:.45;pointer-events:none}.form{display:grid;gap:9px}.meCard{display:flex;align-items:center;justify-content:space-between;gap:10px}.mini{border:1px solid var(--line);background:white;border-radius:12px;padding:7px 9px;font-family:inherit;font-weight:900;color:#4a3028}.smallnote{font-size:12px;color:var(--muted);font-weight:800;margin-top:8px}

/* v2 fixes */
.sheet{
  max-height: calc(92vh - var(--safe));
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.chartbox{
  position: relative;
  height: 170px;
  max-height: 170px;
  overflow: hidden;
}
.chartbox canvas{
  height: 170px !important;
  max-height: 170px !important;
}
.manualActions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:9px;
}
@media(max-width:370px){
  .manualActions{grid-template-columns:1fr}
}


/* v3 text AI */
textarea.input{min-height:92px;resize:vertical;line-height:1.45}
.aiResultName{font-size:22px;font-weight:900;color:#4a3028;margin:6px 0 2px}
.aiResultNum{font-size:54px;line-height:1;font-weight:900;color:var(--rust);margin:8px 0}

.sizeBtn small{display:block;color:var(--rust);font-size:11px;margin-top:2px}


.qtyLine{font-size:14px;font-weight:900;color:var(--olive);background:var(--olive2);border:1px solid #d8e0c6;border-radius:16px;padding:9px 11px;margin-top:10px}

.imgPreview{width:100%;border-radius:20px;border:1px solid var(--line);display:none;margin-top:10px;max-height:240px;object-fit:cover;background:#fff}
.photoActions{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.hiddenInput{display:none}
.imageNoteWrap{display:none;margin-top:10px}
.previewTiny{width:100%;max-height:190px;object-fit:cover;border-radius:18px;border:1px solid var(--line);margin-bottom:10px}

const KEY="shomeret-v6-data";
let CHARTS = {};
const CATS=["קפה ושתייה","בוקר / קטן ליד הקפה","ארוחות קבועות","מתוקים וחטיפים","שמורים שלי"];
function uid(p="id"){return p+"-"+Math.random().toString(36).slice(2)+"-"+Date.now().toString(36)}
function load(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}}

function today(){return new Date().toISOString().slice(0,10)}
function tnow(){return new Date().toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"})}
function fri(k=today()){return new Date(k+"T12:00:00").getDay()===5}

function n(x){return Math.round(x||0).toLocaleString("he-IL")}
function emojiFor(name){if(/קפה|תה/.test(name))return"☕";if(/יין|בירה|באז|שייק|מיץ/.test(name))return"🥤";if(/ביצ/.test(name))return"🥚";if(/עוף|שניצל|חזה/.test(name))return"🍗";if(/בורגר|בשר|קציצ/.test(name))return"🥩";if(/דג|טונה|סלמון/.test(name))return"🐟";if(/לחם|פיתה|בגט/.test(name))return"🍞";if(/אורז|פסטה/.test(name))return"🍚";if(/גבינ|קוטג|יוגורט|חלב/.test(name))return"🧀";if(/סלט|ירק|עגבני|מלפפון/.test(name))return"🥗";if(/משמש|פרי|תפוח|בננה|תפוז/.test(name))return"🍎";if(/שוקולד|גלידה|נוטלה|שלגון/.test(name))return"🍫";if(/חטיף|פריכית|פיטנס/.test(name))return"🥨";if(/תמר/.test(name))return"🌴";return"🥘"}
function fresh(){return {baseGoal:1100,flexGoal:1400,proteinGoal:60,weightGoal:55,openaiKey:"",dailyGoals:{},logs:{},closed:[],rest:[],weights:[],cats:CATS.map((name,i)=>({id:uid("cat"),name,order:i})),foods:SEED,usage:{}}}
function oldImport(){
 if(localStorage.getItem("shomeret-imported-v1"))return;
 const oldFoods=load("default_foods",null), favs=load("user_favs",null), weights=load("weight_log",null), rest=load("rest_days",null), done=load("done_days",null), log=load("food_log",null);
 if(!(oldFoods||favs||weights||rest||done||log))return;
 const D=fresh(), seen=new Set(), foods=[];
 function catFor(name){if(/קפה|תה|מיץ|יין|באז|שייק|בירה/.test(name))return" קפה ושתייה".trim();if(/משמש|תמר|פריכית|פיטנס|פתיבר|בוקר/.test(name))return"בוקר / קטן ליד הקפה";if(/פיתה|בורגר|תירס|סלט|טונה|ביצ|אורז|פסטה|חומוס/.test(name))return"ארוחות קבועות";if(/שוקולד|גלידה|שלגון|נוטלה|חטיף|סניקרס|מתוק/.test(name))return"מתוקים וחטיפים";return"שמורים שלי"}
 ;[...(oldFoods||[]),...(favs||[]).map(f=>({...f,category:"שמורים שלי"}))].forEach((f,i)=>{if(!f.name||seen.has(f.name))return;seen.add(f.name);foods.push({id:uid("food"),name:f.name,cal:+f.cal||0,prot:+f.prot||0,emoji:emojiFor(f.name),category:f.category||catFor(f.name),order:i,verified:true})});
 D.foods=foods.length?foods:SEED;D.weights=weights||[];D.rest=rest||[];D.closed=done||[];D.baseGoal=load("cal_goal",1100);D.proteinGoal=load("prot_goal",60);
 Object.entries(log||{}).forEach(([date,arr])=>D.logs[date]=(arr||[]).map(e=>({id:uid("e"),time:e.time||"",name:e.name,cal:+e.cal||0,prot:+e.prot||0,qty:+e.qty||1,emoji:emojiFor(e.name)})));
 localStorage.setItem(KEY,JSON.stringify(D));localStorage.setItem("shomeret-imported-v1","1");
}
oldImport();
if(!localStorage.getItem(KEY) && localStorage.getItem("shomeret-v5-data")){
 try{localStorage.setItem(KEY, localStorage.getItem("shomeret-v5-data"));}catch(e){}
}
if(!localStorage.getItem(KEY) && localStorage.getItem("shomeret-v4-data")){
 try{localStorage.setItem(KEY, localStorage.getItem("shomeret-v4-data"));}catch(e){}
}
if(!localStorage.getItem(KEY) && localStorage.getItem("shomeret-v3-data")){
 try{localStorage.setItem(KEY, localStorage.getItem("shomeret-v3-data"));}catch(e){}
}
if(!localStorage.getItem(KEY) && localStorage.getItem("shomeret-v2-data")){
 try{localStorage.setItem(KEY, localStorage.getItem("shomeret-v2-data"));}catch(e){}
}
if(!localStorage.getItem(KEY) && localStorage.getItem("shomeret-v1-data")){
 try{localStorage.setItem(KEY, localStorage.getItem("shomeret-v1-data"));}catch(e){}
}

async function analyzeTextFood(){
 const txt=(document.getElementById("aiText")?.value||"").trim();
 if(!txt){toast("כתבי מה אכלת");return}
 if(!S.openaiKey){openAiMissing();return}
 const btn=document.getElementById("checkAiBtn");
 btn.textContent="בודקת…";btn.classList.add("aiLoading");
 try{
   const prompt=`את מעריכה אוכל ליומן אישי בעברית. החזירי JSON בלבד. העריכי קלוריות וחלבון למנה אחת לפי הטקסט. חשוב מאוד: אל תעני בגרמים כברירת מחדל. השתמשי במידות ביתיות טבעיות כמו כפית, כף, חצי כף, פרוסה, כוס, קערה קטנה, חופן, יחידה, 5 כפות אורז, חצי פיתה וכו'. החזירי householdQuantity במילים קצרות ונוחות. גרמים רק אם אין דרך ביתית סבירה. אם חסר גודל מנה/כמות, סמני confidence כ"צריכה עוד רגע" ותני שלוש אפשרויות גודל עם מספרים וגם householdQuantity לכל אפשרות. אל תתני טווחים בתוצאה הראשית — רק מספר אחד באמצע טווח סביר. טקסט המשתמש: ${txt}`;
   const schema={
    type:"object",
    additionalProperties:false,
    required:["name","calories","protein","householdQuantity","confidence","note","needsQuestion","question","options"],
    properties:{
      name:{type:"string"},
      calories:{type:"number"},
      protein:{type:"number"},
      householdQuantity:{type:"string"},
      confidence:{type:"string",enum:["בטוחה בזה","נראה סביר","צריכה עוד רגע"]},
      note:{type:"string"},
      needsQuestion:{type:"boolean"},
      question:{type:"string"},
      options:{type:"array",items:{type:"object",additionalProperties:false,required:["label","calories","protein","householdQuantity"],properties:{label:{type:"string"},calories:{type:"number"},protein:{type:"number"},householdQuantity:{type:"string"}}}}
    }

    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+S.openaiKey},
    body:JSON.stringify({
      model:"gpt-4.1-mini",
      input:[{role:"system",content:"You are a careful nutrition estimator. Return only valid JSON matching the schema. Keep Hebrew food names natural. Prefer household measures over grams. Never give diet advice."},{role:"user",content:prompt}],
      text:{format:{type:"json_schema",name:"food_estimate",strict:true,schema}}

   if(!res.ok){

    throw new Error(err||"OpenAI error");
   }
   const data=await res.json();
   const out=data.output_text || data.output?.flatMap(o=>o.content||[]).map(c=>c.text||"").join("") || "";
   pendingAI=JSON.parse(out);
   pendingAI.originalText=txt;
   pendingAI.edited=false;

 }catch(e){
   console.error(e);
   sheet(`<div class=shtitle>משהו נתקע בבדיקה</div><div class=shsub>יכול להיות שהמפתח לא תקין, שאין הרשאה למודל, או שחיבור הדפדפן נחסם.</div><button class=primary style="width:100%" onclick=hideSheet()>סגור</button>`);

function addAiToLog(){
 if(!pendingAI)return;
 addEntry({name:pendingAI.name,cal:+pendingAI.calories||0,prot:+pendingAI.protein||0,qty:1,qtyText:pendingAI.householdQuantity||"",emoji:emojiFor(pendingAI.name)},false);
 hideSheet();
 toast(`${pendingAI.name} נוסף ליומן`);
 if(pendingAI && pendingAI.imageDataUrl){
   selectedImageDataUrl="";
   const img=document.getElementById("imgPreview"); if(img){img.src="";img.style.display="none";}
   const wrap=document.getElementById("imageNoteWrap"); if(wrap)wrap.style.display="none";
   const note=document.getElementById("imageNote"); if(note)note.value="";
 }
 pendingAI=null;
}
function editAiBeforeAdd(){
 if(!pendingAI)return;
 sheet(`<div class=shtitle>ערכי לפני הוספה</div><div class=form style="margin-top:10px"><input id=ainame class=input placeholder=שם value="${esc(pendingAI.name)}"><input id=aical class=input type=number placeholder=קלוריות value="${pendingAI.calories}"><input id=aiprot class=input type=number placeholder=חלבון value="${pendingAI.protein}"><input id=aiHouse class=input placeholder="כמות במילים" value="${esc(pendingAI.householdQuantity||"")}"><input id=aiqty class=input type=number step=.1 placeholder=כמות value="1"><div class=aiActions><button class="primary wide" onclick=saveEditedAi()>הוסיפי ליומן</button><button class=secondary onclick=showAiResult()>חזרה</button></div></div>`);
}
function saveEditedAi(){
 const q=+aiqty.value||1;
 pendingAI.name=ainame.value.trim()||pendingAI.name;
 pendingAI.calories=(+aical.value||0)*q;
 pendingAI.protein=(+aiprot.value||0)*q;
 pendingAI.householdQuantity=(aiHouse.value||"").trim();
 pendingAI.edited=true;
 addAiToLog();
}
function saveAiFavorite(){
 if(!pendingAI)return;
 if(!pendingAI.edited){
  sheet(`<div class=shtitle>לשמור לקבועים כמו שזה?</div><div class=shsub>זה יהפוך למאכל שאת סומכת עליו בעתיד. כדאי לשמור רק אם הערכים נראים לך מדויקים.</div><button class=primary style="width:100%;margin-bottom:8px" onclick=chooseAiFavoriteCategory()>כן, שמרי לקבועים</button><button class=secondary style="width:100%" onclick=showAiResult()>לא, רק ליומן</button>`);
  return;
 }
 chooseAiFavoriteCategory();
}
function chooseAiFavoriteCategory(){
 const opts=S.cats.sort((a,b)=>a.order-b.order).map(c=>`<button class=secondary style="width:100%;margin-bottom:8px;text-align:right" onclick="saveAiToCat('${c.id}')">${esc(c.name)}</button>`).join("");
 sheet(`<div class=shtitle>לאיזו קטגוריה לשמור?</div><div class=shsub>${esc(pendingAI.name)} · ${pendingAI.householdQuantity?esc(pendingAI.householdQuantity)+" · ":""}${n(pendingAI.calories)} קל׳ · ${n(pendingAI.protein)} חלבון</div>${opts}`);
}
function saveAiToCat(catId){
 const cat=S.cats.find(c=>c.id===catId);
 if(!pendingAI||!cat)return;
 if(!S.foods.some(f=>f.name===pendingAI.name)){
  S.foods.unshift({id:uid("food"),name:pendingAI.name,cal:+pendingAI.calories||0,prot:+pendingAI.protein||0,householdQuantity:pendingAI.householdQuantity||"",emoji:emojiFor(pendingAI.name),category:cat.name,order:-Date.now(),verified:true});
  save();
 }
 hideSheet();render();toast(`${pendingAI.name} נשמר לקבועים`);
}

function saveManualFavorite(){
 const name=(document.getElementById("mName")?.value||"").trim();
 const cal=+document.getElementById("mCal")?.value;
 const prot=+document.getElementById("mProt")?.value||0;
 if(!name||!cal){toast("צריך שם וקלוריות כדי לשמור");return}
 const opts=S.cats.sort((a,b)=>a.order-b.order).map(c=>`<button class=secondary style="width:100%;margin-bottom:8px;text-align:right" onclick="saveManualToCat('${c.id}')">${esc(c.name)}</button>`).join("");
 sheet(`<div class=shtitle>לאיזו קטגוריה לשמור?</div><div class=shsub>${esc(name)} · ${n(cal)} קל׳ · ${n(prot)} חלבון</div>${opts}`);
}
function saveManualToCat(catId){
 const name=(document.getElementById("mName")?.value||"").trim();
 const cal=+document.getElementById("mCal")?.value;
 const prot=+document.getElementById("mProt")?.value||0;
 const cat=S.cats.find(c=>c.id===catId);
 if(!name||!cal||!cat){toast("חסר מידע לשמירה");return}
 if(S.foods.some(f=>f.name===name)){hideSheet();toast("כבר קיים בקבועים");return}
 S.foods.unshift({id:uid("food"),name,cal,prot,emoji:emojiFor(name),category:cat.name,order:-Date.now(),verified:true});
 save();
 hideSheet();
 render();
 toast(`${name} נשמר לקבועים`);
}

function addEntry(e,fixed){const d=today();if(!S.logs[d])S.logs[d]=[];S.logs[d].push({id:uid("e"),time:tnow(),...e});if(e.foodId)S.usage[e.foodId]=(S.usage[e.foodId]||0)+1;save();render();if(fixed){const c=calc(),rem=Math.max(0,dayGoal()-c.cal);let msg=`${e.name} נוסף · ${n(e.cal)} קל׳ · נשאר ${n(rem)}`;if(e.prot>=5)msg+=` · חלבון ${n(c.prot)}/${S.proteinGoal}`;toast(msg)}}
function fullLog(){const arr=[...dayLog()].reverse();sheet(`<div class=shtitle>היום שלי</div><div class=shsub>החדש ביותר למעלה</div>${arr.length?arr.map(e=>row(e,true)).join(""):'<div class=empty>אין פריטים</div>'}`)}
function deleteEntry(id){S.logs[today()]=(S.logs[today()]||[]).filter(e=>e.id!==id);save();hideSheet();render();fullLog()}
function goalSheet(){sheet(`<div class=shtitle>יעד היום</div><div class=shsub>משפיע רק על היום הפתוח</div><button class=secondary style="width:100%;margin-bottom:8px" onclick="setGoal(1100)">1100</button><button class=secondary style="width:100%;margin-bottom:8px" onclick="setGoal(1400)">יום גמיש — 1400</button><button class=secondary style="width:100%" onclick="customGoal()">מותאם</button><input id=goalCustom class=input type=number placeholder="יעד מותאם" style="display:none;margin-top:10px"><button id=goalSave class=primary style="display:none;width:100%;margin-top:10px" onclick="setGoal(+goalCustom.value)">שמרי יעד</button>`)}
function customGoal(){goalCustom.style.display="block";goalSave.style.display="block";goalCustom.focus()}
function setGoal(g){if(!g)return;S.dailyGoals[today()]=g;save();hideSheet();render()}
function closeDay(){if(!S.closed.includes(today()))S.closed.push(today());save();render()}
function reopen(){S.closed=S.closed.filter(x=>x!==today());save();render()}
function restConfirm(){sheet(`<div class=shtitle>להפוך את היום ליום מנוחה?</div><div class=shsub>האוכל שכבר הוספת יישמר, אבל היום לא ייכנס לסטטיסטיקה.</div><div class=tw><button class=primary onclick=makeRest()>כן, עזבי היום לא</button><button class=secondary onclick=hideSheet()>חזרה לספירה</button></div>`)}
function makeRest(){if(!S.rest.includes(today()))S.rest.push(today());S.closed=S.closed.filter(x=>x!==today());save();hideSheet();render()}
function unrest(){S.rest=S.rest.filter(x=>x!==today());save();render()}
function saveWeight(){const v=+wInp.value;if(!v||v<30||v>250){toast("משקל לא תקין");return}const e=S.weights.find(x=>x.date===today());if(e)e.weight=v;else S.weights.push({date:today(),weight:v});S.weights.sort((a,b)=>a.date.localeCompare(b.date));save();render()}
function renderTrend(){const ws=[...S.weights].filter(w=>fri(w.date)).sort((a,b)=>a.date.localeCompare(b.date)),last=ws.at(-1),prev=ws.at(-2);let diff="עוד אין מספיק שקילות";if(last&&prev){const d=last.weight-prev.weight,g=Math.abs(Math.round(d*1000));diff=d<-0.1?`ירדת ${g} גרם`:d>0.1?`עלית ${g} גרם`:"יציב השבוע"}const wk=weekStats();document.getElementById("s-trend").innerHTML=`${header()}<div class=card><div class=title>מגמה</div><div class=big>${diff}</div><div class=metric>משקל אחרון: ${last?last.weight+" ק״ג":"—"}</div><div class=metric>נותר ליעד: ${last?Math.max(0,last.weight-S.weightGoal).toFixed(1):"—"} ק״ג</div><div class=metric>צפי: ${forecast(ws)}</div></div><div class=card><div class=title>גרף שקילות שישי</div><div class="chartbox"><canvas id=canvasTrend></canvas></div></div><div class=card><div class=title>השבוע הנוכחי</div><div class=metric>ימי ספירה סגורים: ${wk.closed}</div><div class=metric>ימי מנוחה: ${wk.rest}</div><div class=metric>ימים לא סגורים: ${wk.open}</div><div class=metric>ממוצע קלוריות: ${wk.avgCal}</div><div class=metric>ממוצע חלבון: ${wk.avgProt}</div></div>`;setTimeout(()=>drawCanvas("canvasTrend",ws.slice(-12)),60)}
function forecast(ws){if(ws.length<2)return"עוד מוקדם לצפי. נצטרך עוד שקילה־שתיים.";const a=ws[0],b=ws.at(-1),weeks=Math.max(1,(new Date(b.date)-new Date(a.date))/(7*864e5)),rate=(a.weight-b.weight)/weeks;if(rate<=0)return"עוד מוקדם לצפי. נצטרך עוד שקילה־שתיים.";const left=Math.ceil((b.weight-S.weightGoal)/rate),dt=new Date();dt.setDate(dt.getDate()+left*7);return`עוד ${left} שבועות · בערך ${dt.toLocaleDateString("he-IL")}`}
function weekStats(){let closed=0,restc=0,open=0,cs=0,ps=0;const now=new Date(),start=new Date(now);start.setDate(now.getDate()-now.getDay());for(let i=0;i<7;i++){const d=new Date(start);d.setDate(start.getDate()+i);const k=d.toISOString().slice(0,10);if(fri(k))continue;if(S.rest.includes(k)){restc++;continue}if(S.closed.includes(k)){closed++;const c=calc(k);cs+=c.cal;ps+=c.prot}else if((S.logs[k]||[]).length)open++}return{closed,rest:restc,open,avgCal:closed?n(cs/closed):"—",avgProt:closed?n(ps/closed):"—"}}
function drawChart(){drawCanvas("canvas",[...S.weights].filter(w=>fri(w.date)).sort((a,b)=>a.date.localeCompare(b.date)).slice(-8))}
function drawCanvas(id,ws){
 const c=document.getElementById(id);
 if(!c||!window.Chart)return;
 if(CHARTS[id]){CHARTS[id].destroy();CHARTS[id]=null;}
 c.style.height="170px";
 c.height=170;
 CHARTS[id]=new Chart(c,{type:"line",data:{labels:ws.map(w=>new Date(w.date).toLocaleDateString("he-IL",{day:"numeric",month:"numeric"})),datasets:[{data:ws.map(w=>w.weight),borderColor:"#b85f3a",backgroundColor:"rgba(184,95,58,.12)",tension:.35,pointRadius:4,pointBackgroundColor:"#b85f3a"},{data:ws.map(()=>S.weightGoal),borderColor:"#637447",borderDash:[5,5],pointRadius:0}]},options:{responsive:true,maintainAspectRatio:false,animation:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{grid:{color:"rgba(58,37,31,.08)"}}}}});
}
function renderMe(){
 document.getElementById("s-me").innerHTML=`${header()}<div class="card meCard"><div><div class=title>הקבועים שלי</div><div class=smallnote>ניהול המאכלים שאני סומכת עליהם</div></div><button class=small onclick=manageFoods()>ניהול</button></div><div class=card><div class=title>יעדים</div><div class=form style="margin-top:10px"><div class="smallnote">יעד קלוריות בסיס</div><input id=base class=input type=number value="${S.baseGoal}"><div class="smallnote">יעד משקל</div><input id=wgoal class=input type=number step=.1 value="${S.weightGoal}"><button class=primary onclick=saveGoals()>שמרי יעדים</button></div></div><div class=card><div class=title>חיבור OpenAI</div><div class=smallnote>נדרש להערכות טקסט ותמונה.</div><input id=openaiKey class=input type=password placeholder="API key" value="${esc(S.openaiKey||"")}" style="margin-top:10px"><div class=tw><button class=primary onclick=saveOpenAIKey()>שמירה</button><button class=secondary onclick=testOpenAI()>בדיקת חיבור</button></div></div>`;
}

function saveGoals(){S.baseGoal=+base.value||1100;S.weightGoal=+wgoal.value||55;save();toast("היעדים נשמרו");render()}
function saveOpenAIKey(){S.openaiKey=(document.getElementById("openaiKey")?.value||"").trim();save();toast("החיבור נשמר")}
async function testOpenAI(){
 saveOpenAIKey();
 if(!S.openaiKey){toast("צריך API key");return}
 try{
  const res=await fetch("https://api.openai.com/v1/responses",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+S.openaiKey},body:JSON.stringify({model:"gpt-4.1-mini",input:"Return only the word ok."})});
  if(!res.ok)throw new Error(await res.text());
  toast("החיבור עובד");
 }catch(e){console.error(e);toast("החיבור לא עבד")}
}
function manageFoods(){const cats=[...S.cats].sort((a,b)=>a.order-b.order);sheet(`<div class=shtitle>ניהול הקבועים</div><div class=shsub>חיצים לסידור, עריכה ומחיקה</div><button class=primary style="width:100%;margin-bottom:9px" onclick=editFood()>+ מאכל קבוע חדש</button><button class=secondary style="width:100%;margin-bottom:9px" onclick=catEditor()>ניהול קטגוריות</button>${cats.map(c=>`<div class="cat open"><div class=cathead>${esc(c.name)}</div><div class=catbody>${S.foods.filter(f=>f.category===c.name).sort((a,b)=>(a.order||0)-(b.order||0)).map(mFood).join("")||'<div class=empty>אין פריטים</div>'}</div></div>`).join("")}`)}
function mFood(f){return`<div class=row><div class=emoji>${f.emoji}</div><div class=main><div class=name>${esc(f.name)}</div><div class=meta>${n(f.cal)} קל׳ · ${n(f.prot)} חלבון</div></div><button class=mini onclick="moveFood('${f.id}',-1)">↑</button><button class=mini onclick="moveFood('${f.id}',1)">↓</button><button class=mini onclick="editFood('${f.id}')">✎</button><button class=mini onclick="delFood('${f.id}')">×</button></div>`}
function moveFood(id,dir){const f=S.foods.find(x=>x.id===id),same=S.foods.filter(x=>x.category===f.category).sort((a,b)=>(a.order||0)-(b.order||0)),i=same.findIndex(x=>x.id===id),sw=same[i+dir];if(sw){[f.order,sw.order]=[sw.order,f.order];save();manageFoods()}}
function delFood(id){S.foods=S.foods.filter(f=>f.id!==id);save();manageFoods()}
function editFood(id){const f=id?S.foods.find(x=>x.id===id):{name:"",cal:"",prot:"",emoji:"🥘",category:S.cats[0]?.name||"שמורים שלי"};sheet(`<div class=shtitle>${id?'עריכת מאכל':'מאכל קבוע חדש'}</div><div class=form style="margin-top:10px"><input id=efn class=input placeholder=שם value="${esc(f.name)}"><input id=efc class=input type=number placeholder=קלוריות value="${f.cal}"><input id=efp class=input type=number placeholder=חלבון value="${f.prot}"><input id=efe class=input placeholder=אימוג׳י value="${f.emoji||'🥘'}"><select id=efcat class=select>${S.cats.map(c=>`<option ${c.name===f.category?'selected':''}>${esc(c.name)}</option>`).join("")}</select><button class=primary onclick="saveFood('${id||""}')">שמרי</button></div>`)}
function saveFood(id){const vals={name:efn.value.trim(),cal:+efc.value||0,prot:+efp.value||0,emoji:efe.value.trim()||"🥘",category:efcat.value};if(!vals.name||!vals.cal){toast("צריך שם וקלוריות");return}if(id)Object.assign(S.foods.find(f=>f.id===id),vals);else S.foods.unshift({id:uid("food"),...vals,order:-Date.now(),verified:true});save();manageFoods()}
function catEditor(){sheet(`<div class=shtitle>ניהול קטגוריות</div><div class=form>${S.cats.sort((a,b)=>a.order-b.order).map(c=>`<div class=row><input class=input value="${esc(c.name)}" onchange="renameCat('${c.id}',this.value)"><button class=mini onclick="delCat('${c.id}')">מחקי</button></div>`).join("")}<button class=primary onclick=addCat()>+ קטגוריה חדשה</button><button class=secondary onclick=manageFoods()>חזרה</button></div>`)}
function renameCat(id,name){const c=S.cats.find(x=>x.id===id);if(!c||!name.trim())return;const old=c.name;c.name=name.trim();S.foods.forEach(f=>{if(f.category===old)f.category=c.name});save()}
function addCat(){const name=prompt("שם קטגוריה חדשה");if(!name)return;S.cats.push({id:uid("cat"),name,order:S.cats.length});save();catEditor()}
function delCat(id){const c=S.cats.find(x=>x.id===id),others=S.cats.filter(x=>x.id!==id);if(!others.length){toast("אי אפשר למחוק את הקטגוריה האחרונה");return}const target=prompt("לאן להעביר את המאכלים?",others[0].name)||others[0].name;S.foods.forEach(f=>{if(f.category===c.name)f.category=target});S.cats=S.cats.filter(x=>x.id!==id);save();catEditor()}
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(window.tt);window.tt=setTimeout(()=>t.classList.remove("show"),1700)}
function sheet(html){document.getElementById("sheetbody").innerHTML=html;document.getElementById("sheet").classList.add("show")}
function hideSheet(){document.getElementById("sheet").classList.remove("show")}
render(); if("serviceWorker" in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
</script></body></html>
